<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Blog Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <a href="/" class="btn btn-secondary mb-4">
        Back
    </a>
<img
        th:if="${blog.imageName != null}"
        th:src="@{'/uploads/' + ${blog.imageName}}"
        class="img-fluid rounded mb-4">
    <h1 th:text="${blog.title}">
        Title
    </h1>

    <p>
        <strong>Author:</strong>
        <span th:text="${blog.author}"></span>
    </p>

    <p>
        <strong>Category:</strong>
        <span th:text="${blog.category}"></span>
    </p>

    <hr><hr>

<div class="mb-3">

    <a class="btn btn-primary"
       th:href="@{/like/{id}(id=${blog.id})}">

        👍 Like

    </a>

    <span class="ms-3">
        Popularity Score:
<strong th:text="${blog.likes}">
            0
        </strong>

    </span>

</div>
    <p th:text="${blog.content}">
        Content
    </p>

</div>

</body>
</html>
