<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Edit Blog</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2>Edit Blog</h2>

    <form th:action="@{/update}"
          th:object="${blogPost}"
          method="post">

        <input type="hidden"
               th:field="*{id}" />

        <div class="mb-3">

            <label>Title</label>

            <input type="text"
                   class="form-control"
                   th:field="*{title}">

        </div>

        <div class="mb-3">

            <label>Author</label>

            <input type="text"
                   class="form-control"
                   th:field="*{author}">

        </div>

        <div class="mb-3">

            <label>Category</label>

            <input type="text"
                   class="form-control"
                   th:field="*{category}">

        </div>

        <div class="mb-3">

            <label>Excerpt</label>

            <textarea class="form-control"
                      th:field="*{excerpt}">
            </textarea>

        </div>

        <div class="mb-3">

            <label>Content</label>

            <textarea class="form-control"
                      rows="8"
                      th:field="*{content}">
            </textarea>

        </div>

        <button class="btn btn-success">
            Update Blog
        </button>

    </form>

</div>

</body>
</html>
