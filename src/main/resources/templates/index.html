<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Home
Create Blog</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="/">
            BlogSphere
        </a>

        <a class="btn btn-success"
           href="/create">
            Create Blog
        </a>

    </div>
</nav>

<div class="container mt-5">

    <h1 class="mb-4">
        Discover Articles & Insights
    </h1>
<form method="get"
      action="/"
      class="mb-4">

    <div class="input-group">

        <input
                type="text"
                name="keyword"
                class="form-control"
                placeholder="Search blogs by title">

        <button
                class="btn btn-dark"
                type="submit">

            Search

        </button>

    </div>

</form>
    <div class="row">

        <div class="col-md-6 mb-4"
             th:each="blog : ${blogs}">

            <div class="card shadow-sm">

                <div class="card-body">
<img
        th:if="${blog.imageName != null}"
        th:src="@{'/uploads/' + ${blog.imageName}}"
        class="card-img-top"
        style="height:220px; object-fit:cover;">
                    <h3 th:text="${blog.title}">
                        Blog Title
                    </h3>

                    <p>
                        <strong>Author:</strong>
                        <span th:text="${blog.author}">
                        </span>
                    </p>

                    <p>
                        <strong>Category:</strong>
                        <span th:text="${blog.category}">
                        </span>
                    </p>

                    <p th:text="${blog.excerpt}">
                    </p>
                   

    <div class="d-flex gap-2">

    <a class="btn btn-primary"
       th:href="@{/blog/{id}(id=${blog.id})}">
        Read More
    </a>

    <a class="btn btn-warning"
       th:href="@{/edit/{id}(id=${blog.id})}">
        Edit
    </a>

    <a class="btn btn-danger"
       th:href="@{/delete/{id}(id=${blog.id})}">
        Delete
    </a>

</div>

                </div>

            </div>

        </div>

    </div>

</div>
<footer class="bg-dark text-white text-center py-3 mt-5">
    BlogSphere © 2026
</footer>
</body>
</html>
